# Render.com Blueprint — SafeRoute / Sapa Jol
# Python FastAPI backend + external PostgreSQL (Neon)

services:
  - type: web
    name: saferoute-api
    env: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # Neon PostgreSQL connection string — set in Render Dashboard
      - key: JWT_SECRET
        sync: false   # set in Render Dashboard
      - key: GOOGLE_MAPS_API_KEY
        sync: false   # set in Render Dashboard
      - key: OPENAI_API_KEY
        sync: false   # set in Render Dashboard
      - key: DEBUG
        value: "false"
      - key: BUFFER_ZONE_KM
        value: "5.0"
      - key: ALERT_RADIUS_KM
        value: "15.0"
      - key: DANGER_THRESHOLD_KM
        value: "3.0"
