# Render.com Blueprint — SafeRoute / Sapa Jol
# Python FastAPI backend with PostGIS

databases:
  - name: saferoute-db
    databaseName: saferoute
    user: saferoute
    plan: free
    region: frankfurt

services:
  - type: web
    name: saferoute-api
    env: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saferoute-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false   # добавь вручную в Render Dashboard
      - key: DEBUG
        value: "false"
      - key: BUFFER_ZONE_KM
        value: "5.0"
      - key: ALERT_RADIUS_KM
        value: "15.0"
      - key: DANGER_THRESHOLD_KM
        value: "3.0"
      - key: SIMULATOR_INTERVAL_SECONDS
        value: "5"
