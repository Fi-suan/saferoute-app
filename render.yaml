# Render.com Blueprint — SafeRoute / Sapa Jol
# Деплой: push в GitHub → Render автоматически подхватит этот файл
#
# Сервис: Web Service (Node.js) + PostgreSQL база данных

databases:
  - name: saferoute-db
    databaseName: saferoute
    user: saferoute
    plan: free
    region: frankfurt

services:
  - type: web
    name: saferoute-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node migrate.js && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saferoute-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false   # добавь вручную в Render Dashboard
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
